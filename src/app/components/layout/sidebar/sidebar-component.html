<button
  (click)="toggle()"
  class="fixed top-4 left-4 z-50 inline-flex md:hidden items-center justify-center h-10 w-10 rounded-lg bg-menta-500 text-white shadow-sm hover:bg-menta-900 transition-colors duration-200"
  aria-label="Menú de navegación"
>
  @if (open()) {
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M18 6 6 18" />
      <path d="m6 6 12 12" />
    </svg>
  } @else {
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="4" x2="20" y1="12" y2="12" />
      <line x1="4" x2="20" y1="6" y2="6" />
      <line x1="4" x2="20" y1="18" y2="18" />
    </svg>
  }
</button>

@if (open()) {
  <div
    class="fixed inset-0 z-30 bg-black/20 md:hidden"
    (click)="close()"
    tabindex="0"
    aria-hidden="true"
  ></div>
}

<aside
  class="fixed top-0 left-0 z-40 h-screen w-64 bg-menta-50 border-r border-menta-100 shadow-sm flex flex-col transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0"
  [class.translate-x-0]="open()"
>
  <a (click)="close()" routerLink="/" class="flex items-center gap-3 px-5 py-6 border-b border-menta-100 group">
    <span class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-menta-500 text-white shadow-sm group-hover:bg-menta-900 transition-colors duration-200">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
      </svg>
    </span>
    <div class="leading-tight">
      <p class="text-base font-bold text-menta-900">UNSMF</p>
      <p class="text-xs text-menta-900/70">Cuidando tu salud</p>
    </div>
  </a>

  <nav class="flex-1 flex flex-col gap-1 px-3 py-4 overflow-y-auto">
    <a (click)="close()" routerLink="/" routerLinkActive="sidebar-link-active" [routerLinkActiveOptions]="{exact: true}" class="sidebar-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
        <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      </svg>
      Inicio
    </a>
    <a (click)="close()" routerLink="/asistente" routerLinkActive="sidebar-link-active" class="sidebar-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      Asistente
    </a>
    <a (click)="close()" routerLink="/calculadora" routerLinkActive="sidebar-link-active" class="sidebar-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="2" width="16" height="20" rx="2" />
        <line x1="8" x2="16" y1="6" y2="6" />
        <line x1="8" x2="8" y1="10" y2="10" />
        <line x1="12" x2="12" y1="10" y2="10" />
        <line x1="16" x2="16" y1="10" y2="10" />
        <line x1="8" x2="8" y1="14" y2="14" />
        <line x1="12" x2="12" y1="14" y2="14" />
        <line x1="16" x2="16" y1="14" y2="14" />
        <line x1="8" x2="8" y1="18" y2="18" />
        <line x1="12" x2="12" y1="18" y2="18" />
      </svg>
      Calculadora
    </a>
    <a (click)="close()" routerLink="/comentarios" routerLinkActive="sidebar-link-active" class="sidebar-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      Comentarios
    </a>
  </nav>

  <div class="px-4 py-4 border-t border-menta-100">
    <a (click)="close()" routerLink="/asistente" class="flex items-center justify-center gap-2 rounded-full bg-menta-500 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-menta-900 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.97] transition-all duration-200">
      Pedir ayuda
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14" />
        <path d="m12 5 7 7-7 7" />
      </svg>
    </a>
  </div>
</aside>
